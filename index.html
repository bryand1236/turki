<section id="hagia-sophia" class="section sec-index">
  <div class="hero-glass">
    <div class="title-container">
      <li class="title">Hagia Sophia</li>
    </div>
    <li class="description">Hagia Sophia adalah bangunan ikonik di Istanbul yang pernah berfungsi sebagai gereja, masjid, museum, dan sejak 2020 kembali menjadi masjid, sehingga menjadi simbol penting perubahan agama dan budaya di Turki.</li>
  </div>
  <a href="home.html">
  <button class="explore">Jelajahi Sekarang</button>
  </a>
  <div class="carousel-container" id="carouselContainer">
    <div class="carousel-wrapper" id="carouselWrapper">
      <img class="image" src="image/hagia.avif" alt="">
      <img class="image2" src="image/cappadocia.avif" alt="">
      <img class="image2" src="image/topkapi.jpg" alt="">
      <img class="image2" src="image/ephesus.avif" alt="">
    </div>
  </div>

<script>
   let currentSlide = 0;
  const carouselContainer = document.getElementById('carouselContainer');
  const carouselWrapper = document.getElementById('carouselWrapper');
  
  // PERBAIKAN 1: Tambahkan titik (.) untuk querySelector class
  const exploreBtn = document.querySelector('.explore'); 
  const classes = ['explore', 'explore-2', 'explore-3', 'explore-4']; 

  function updateButtonClass() {
    // PERBAIKAN 2: Hapus semua class lama dulu agar tidak tumpuk
    exploreBtn.classList.remove(...classes);
    
    // PERBAIKAN 3: Tambah class sesuai index slide saat ini
    if (classes[currentSlide]) {
      exploreBtn.classList.add(classes[currentSlide]);
    }
  }

  carouselContainer.addEventListener('click', (e) => {
    const rect = carouselContainer.getBoundingClientRect();
    const clickX = e.clientX - rect.left;
    const containerWidth = rect.width;
    const images = carouselWrapper.querySelectorAll('img');
    const maxSlide = images.length - 1;

    if (clickX > containerWidth / 1.2) {
      currentSlide = Math.min(maxSlide, currentSlide + 1);
    } else {
      currentSlide = Math.max(0, currentSlide - 1);
    }

    carouselWrapper.style.transition = 'transform 0.4s ease-out';
    carouselWrapper.style.transform = `translateX(${currentSlide * -330}px)`; 
    
    updateActiveImage();
    updateButtonClass(); // Panggil fungsi ganti class tombol
  });

  function updateActiveImage() {
    const images = carouselWrapper.querySelectorAll('img');
    images.forEach((img, index) => {
      img.classList.remove('active');
      if (index === currentSlide) img.classList.add('active');
    });
    
    const imageSources = ['image/hagia.avif', 'image/cappadocia.avif', 'image/topkapi.jpg', 'image/ephesus.avif'];
    const slideTexts = [
      { title: 'Hagia Sophia', desc: 'Hagia Sophia adalah bangunan ikonik di Istanbul yang pernah berfungsi sebagai gereja, masjid, museum, dan sejak 2020 kembali menjadi masjid, sehingga menjadi simbol penting perubahan agama dan budaya di Turki.' },
      { title: 'Cappadocia', desc: 'Cappadocia (Kapadokia) adalahÂ wilayah bersejarah di Anatolia Tengah, Turki, yang terkenal dengan bentang alam geologis unik hasil erupsi gunung berapi kuno.' },
      { title: 'Topkapi Palace', desc: 'Istana Topkapi (TopkapÄ± SarayÄ±) adalahÂ kompleks istana megah di Istanbul, Turki, yang berfungsi sebagai pusat pemerintahan dan kediaman resmi Sultan Utsmaniyah (Ottoman) selama hampir 400 tahun (1465â€“1856).Â ' },
      { title: 'Ephesus', desc: 'Efesus (Ephesus) adalahÂ kota pelabuhan Yunani kuno yang sangat penting di pesisir Ionia (sekarang Turki barat dekat SelÃ§uk), yang berkembang pesat di bawah Kekaisaran Romawi.Â ' }
    ];

    const section = document.getElementById('hagia-sophia');
    const titleEl = section.querySelector('.title');
    const descEl = section.querySelector('.description');

    if (titleEl && descEl && slideTexts[currentSlide]) {
      descEl.style.transition = "opacity 0.4s ease, transform 0.4s ease";
      descEl.style.opacity = "0";
      descEl.style.transform = "translateY(30px)";

      exploreBtn.style.transition = "opacity 0.4s ease, transform 0.6s ease";
      exploreBtn.style.opacity = "0";
      exploreBtn.style.transform = "translateY(0px)";

      titleEl.classList.remove('exit', 'enter');
      void titleEl.offsetWidth;
      titleEl.classList.add('exit');
      
      setTimeout(() => {
        titleEl.innerText = slideTexts[currentSlide].title;
        descEl.innerText = slideTexts[currentSlide].desc;
        titleEl.classList.remove('exit');
        titleEl.classList.add('enter');
        descEl.style.opacity = "1";
        descEl.style.transform = "translateY(0px)";

        exploreBtn.style.opacity = "1";
        exploreBtn.style.transform = "translateY(0px)";
      }, 400);
    }
    section.style.transition = "background-image 0.4s ease-in";
    section.style.backgroundImage = `url(${imageSources[currentSlide]})`;
  }

  // Inisialisasi awal
  updateActiveImage();
  updateButtonClass();
</script>
</section>



<script>
// hide navbar when scrolling down, show when scrolling up
(function(){
  let lastScroll = window.pageYOffset;
  const nav = document.querySelector('nav');
  if (!nav) return;
  window.addEventListener('scroll', () => {
    const current = window.pageYOffset;
    if (current > lastScroll && current > 50) {
      nav.classList.add('navbar-hidden');
    } else {
      nav.classList.remove('navbar-hidden');
    }
    lastScroll = current;
  });
})();
</script>
